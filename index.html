<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not Hesaplayıcı+</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f8fafc" />
    <script>
      // Immediately set the theme on page load to prevent FOUC and ensure the app's choice is independent of the browser.
      (function() {
        const theme = (() => {
          try {
            // 1. Check for a user-saved theme in localStorage.
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light' || savedTheme === 'dark') {
              return savedTheme;
            }
          } catch (e) {
            // localStorage might be disabled or inaccessible.
          }
    
          // 2. If no theme is saved, default to 'light' regardless of system preference.
          // This makes the app theme independent of the browser's theme.
          return 'light';
        })();

        // Set 'color-scheme' on the root element to signal the theme to the browser.
        document.documentElement.style.colorScheme = theme;

        // Add or remove the 'dark' class for TailwindCSS class-based dark mode.
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        
        // Update the theme-color meta tag for mobile browser chrome.
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) {
          const color = theme === 'dark' ? '#0f172a' : '#f8fafc';
          themeColorMeta.setAttribute('content', color);
        }
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Set Tailwind darkMode to 'class' and extend colors
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: tailwind.colors.blue,
            }
          }
        }
      }
    </script>
